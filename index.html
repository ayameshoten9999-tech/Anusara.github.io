<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Anusara Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #1a1a1a, #000);
  color: white;
  text-align: center;
}

.container {
  padding: 30px;
}

img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin-top: 20px;
}

h1 {
  margin: 10px 0;
  font-size: 24px;
}

/* 👇 ข้อความหลัก */
.big-text {
  font-size: 22px;
  font-weight: bold;
  color: #ffd1dc;
  margin-top: 10px;
}

/* 👇 ข้อความรอง */
.small-text {
  font-size: 18px;
  color: #fff;
  margin-bottom: 20px;
}

/* 👇 ปุ่ม */
.link {
  display: block;
  margin: 12px auto;
  padding: 14px;
  width: 80%;
  max-width: 300px;
  background: #ff4d6d;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  font-weight: bold;
  transition: 0.3s;
}

.link:hover {
  background: #ff1e4d;
}
</style>

</head>

<body>

<div class="container">

<img src="https://via.placeholder.com/150">

<h1>✧˖° ꒰🍓🍵 Anusara Store 🧚🏻‍♀️🐿️ ˚˖✧</h1>

<p class="big-text">ミ รับทำ ป้ายคิ้วท์ๆ กึ่ง Ads สไตล์น่ารัก ✨</p>
<p class="small-text">♡ เริ่มต้นเพียง 89 บาท</p>

<a class="link" href="#">Instagram</a>
<a class="link" href="#">Line</a>
<a class="link" href="#">TikTok</a>

</div>

</body>
</html>
