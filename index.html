<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Anusara Store</title>

<style>

/* 🔥 ปรับขนาดตัวอักษรตรงนี้ที่เดียว */
:root {
  --title-size: 28px;     /* ชื่อร้าน */
  --big-size: 24px;       /* ข้อความหลัก */
  --small-size: 18px;     /* ข้อความรอง */
  --button-size: 18px;    /* ขนาดตัวหนังสือในปุ่ม */
}

/* พื้นฐาน */
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  padding: 30px;
}

img {
  width: 120px;
  border-radius: 50%;
}

/* ใช้ค่าจากด้านบน */
h1 {
  font-size: var(--title-size);
}

.big-text {
  font-size: var(--big-size);
  font-weight: bold;
}

.small-text {
  font-size: var(--small-size);
}

.link {
  display: block;
  margin: 12px auto;
  padding: 14px;
  width: 80%;
  max-width: 300px;
  background: #ff4d6d;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  font-size: var(--button-size);
}

</style>
</head>

<body>

<div class="container">

<img src="https://via.placeholder.com/150">

<h1>✧˖° ꒰🍓🍵 Anusara Store 🧚🏻‍♀️🐿️ ˚˖✧</h1>

<p class="big-text">ミ รับทำ ป้ายคิ้วท์ๆ กึ่ง Ads สไตล์น่ารัก ✨</p>
<p class="small-text">♡ เริ่มต้นเพียง 89 บาท</p>

<a class="link" href="#">เช็คคิว</a>
<a class="link" href="#">รายละเอียดการสั่งงาน</a>
<a class="link" href="#">ตัวอย่างงาน</a>
<a class="link" href="#">เลือกตูน</a>

</div>

</body>
</html>
