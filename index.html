<!DOCTYPE html>
<html lang="th">
<head>

<title>My Link</title>

<style>

  margin: 0;

  background: linear-gradient(to bottom, #1a1a1a, #000);
  color: white;
  text-align: center;
}

.container {
  padding: 30px;
}

img {
  width: 120px;
  height: 120px;
  border-radius: 50%;

}

  margin: 10px 0;
}

  padding: 14px;

  max-width: 300px;
  background: #ff4d6d;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

<img src="https://via.placeholder.com/150">

<h1>PLARAA</h1>
<p>My lifestyle & links 💖</p>

</html>
